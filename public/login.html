<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus POS — تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #D4AF37;
      --gold-glow: rgba(212,175,55,0.2);
      --bg: #050505;
      --surface: #111;
      --border: rgba(255,255,255,0.08);
      --text: #fff;
      --muted: #666;
      --danger: #ff4757;
      --success: #00e676;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* خلفية حية */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%);
      animation: drift 8s ease-in-out infinite alternate;
    }
    .bg-glow::after {
      content: '';
      position: absolute;
      bottom: -200px; left: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(212,175,55,0.04) 0%, transparent 70%);
      animation: drift 10s ease-in-out infinite alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0, 0); }
      to   { transform: translate(40px, 30px); }
    }

    .login-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-card {
      background: rgba(17,17,17,0.9);
      border: 1px solid rgba(212,175,55,0.2);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(20px);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(212,175,55,0.05),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15) 0%, rgba(212,175,55,0.05) 100%);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 16px;
      box-shadow: 0 10px 30px rgba(212,175,55,0.1);
    }
    .logo-name {
      font-size: 2rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 3px;
      display: block;
    }
    .logo-sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 4px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      color: #aaa;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .field input, .field select {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid #2a2a2a;
      color: var(--text);
      padding: 14px 16px;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      transition: all 0.2s;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: var(--gold);
      background: rgba(212,175,55,0.03);
      box-shadow: 0 0 20px rgba(212,175,55,0.1);
    }
    .field input::placeholder { color: #444; }

    .btn-login {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold) 0%, #f0c830 100%);
      color: #000;
      border: none;
      border-radius: 14px;
      font-family: 'Cairo', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 8px 25px rgba(212,175,55,0.3);
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(212,175,55,0.45);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .error-msg {
      background: rgba(255,71,87,0.1);
      border: 1px solid rgba(255,71,87,0.25);
      color: var(--danger);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      text-align: center;
      margin-top: 14px;
      display: none;
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-6px); }
      75%       { transform: translateX(6px); }
    }

    .footer-note {
      text-align: center;
      color: #333;
      font-size: 0.78rem;
      margin-top: 28px;
      font-family: 'IBM Plex Mono', monospace;
    }
    .footer-note span { color: #555; }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="login-wrap">
  <div class="login-card">

    <div class="logo-wrap">
      <div class="logo-icon">☕</div>
      <span class="logo-name">NEXUS</span>
      <div class="logo-sub">نظام إدارة المقاهي الاحترافي</div>
    </div>

    <div class="field">
      <label>معرّف المقهى</label>
      <input type="text" id="inp-cafe" placeholder="مثال: lacazza" autocomplete="off" />
    </div>

    <div class="field">
      <label>اسم المستخدم</label>
      <input type="text" id="inp-user" placeholder="admin" autocomplete="off" />
    </div>

    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="inp-pass" placeholder="••••••••"
             onkeydown="if(event.key==='Enter') handleLogin()" />
    </div>

    <button class="btn-login" id="btn-login" onclick="handleLogin()">
      <span id="btn-text">دخول النظام</span>
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="footer-note">
      Nexus POS <span>v2.0 — SaaS Edition</span>
    </div>
  </div>
</div>

<script type="module">
  import { NexusAuth } from './js/supabaseClient.js';

  // إذا كان مسجلاً بالفعل، اذهب للـ dashboard مباشرة
  const session = NexusAuth.getSession();
  if (session) {
    window.location.href = 'public/dashboard.html?branch=' + (session.branchId || 'all');
  }

  window.handleLogin = async function() {
    const cafeId   = document.getElementById('inp-cafe').value.trim().toLowerCase();
    const username = document.getElementById('inp-user').value.trim();
    const password = document.getElementById('inp-pass').value;
    const errorEl  = document.getElementById('error-msg');
    const btn      = document.getElementById('btn-login');
    const btnText  = document.getElementById('btn-text');

    errorEl.style.display = 'none';

    if (!cafeId || !username || !password) {
      showError('يرجى تعبئة جميع الحقول');
      return;
    }

    // loading state
    btn.disabled = true;
    btnText.innerHTML = '<div class="spinner"></div>';

    const result = await NexusAuth.login(cafeId, username, password);

    btn.disabled = false;
    btnText.textContent = 'دخول النظام';

    if (result.success) {
      const { session } = result;
      // توجيه حسب الدور
      if (session.role === 'owner' || session.role === 'manager') {
        window.location.href = 'public/dashboard.html?branch=' + (session.branchId || 'all');
      } else {
        window.location.href = 'public/dashboard.html?branch=' + session.branchId;
      }
    } else {
      showError(result.message);
    }
  };

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>

</body>
</html>
